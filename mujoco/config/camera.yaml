# Head camera offscreen render -> shared-memory bridge (module::Camera)
#
# Renders the MJCF "head" camera (models/k1/K1_22dof.xml, mounted on the
# Head_2 body) offscreen at width x height @ fps and publishes rgb8 frames
# into a Boost.Interprocess shared-memory segment matching NUbots'
# input::K1Camera SharedImageHeader byte-for-byte. `segment` must match the
# corresponding entry's `segment:` in NUbots_K1's
# module/input/K1Camera/data/config/K1Camera.yaml (default below matches that
# file's "Left Camera" entry: _boostercamera_head_rgb — NUbridge dropped the
# "raw" from the topic name during RoboCup 2026. The right camera is not
# rendered yet — K1Camera warn-retries on it harmlessly; stereo is future work).
#
# Lens intrinsics (focal_length/fov/centre/k1/k2) are NOT configured here --
# they're derived at runtime from the MJCF camera's fovy + width/height below
# (MuJoCo is an ideal pinhole: the principal point is always the image centre
# and there is no distortion model, so centre_x/centre_y/k1/k2 are always 0).
# See module/Camera/src/Camera.cpp.

segment: _boostercamera_head_rgb

# Head-pose shared-memory segment (K1Sensors "NBPO" layout; must match
# NUbots_K1's K1Sensors.yaml `segment:`). Head (Head_2) pose in the yaw-only
# base footprint frame, like NUbridge on the real robot. This is the only
# path torso tilt takes into NUbots, i.e. what makes fall detection and the
# GetUp chain work. Empty string disables.
pose_segment: _head_pose

# rgb8, so the segment carries width*height*3 pixel bytes after the header --
# 640x480 (921600 bytes) stays well under K1Camera's 2 MiB MAX_IMAGE_BYTES and
# matches the MuJoCo default offscreen buffer size (models/k1/K1_22dof.xml and
# the scene files don't override <visual><global offwidth/offheight/>).
width: 640
height: 480
fps: 30

# Name of the <camera> element the model attaches to the head (see
# models/k1/K1_22dof.xml's Head_2 body).
mjcf_camera: head
