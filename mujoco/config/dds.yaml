# Booster SDK DDS surface (module::SdkBridge)
domain: 0 # NUbots' HardwareIO hardcodes ChannelFactory::Init(0)
udp_only: false # true disables SHM transport (docker boundary fallback; or env K1_DDS_UDP_ONLY=1)
battery_soc: 100.0 # constant SOC reported on rt/battery_state
unknown_api_status: 0 # RPC status returned for unimplemented api_ids (0 = accept + warn)
