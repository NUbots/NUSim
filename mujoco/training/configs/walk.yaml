# Reference hyperparameters for policies/walk.py (override in the Walk class or
# extend train.py to read this). Command ranges + reward weights are on the Walk
# class; PPO knobs mirror train.py's defaults. Modeled on htwk-gym Parameter_Walk.yaml.
command:
  vx: [-0.3, 0.6]   # m/s
  vy: [-0.2, 0.2]   # m/s
  vyaw: [-0.6, 0.6] # rad/s
  gait_frequency: 1.5

rewards:
  track_lin: 1.5
  track_ang: 0.8
  upright: 0.5
  height: 0.3
  lin_vel_z: 0.3
  ang_vel_xy: 0.1
  action_rate: 0.02
  torque: 0.0002
  alive: 0.5
  track_sigma: 0.25

ppo:
  num_envs: 2048
  episode_length: 1000
  learning_rate: 3.0e-4
  entropy_cost: 1.0e-2
  discounting: 0.97
  unroll_length: 20
  num_minibatches: 32
